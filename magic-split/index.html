<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDHALLOW — Forge Never Sleeps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e0e6f0;font-family:'Noto Sans KR','IBM Plex Mono','Courier New',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d1224}::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Layout */
.topbar{height:44px;background:#0d1224;border-bottom:1px solid #1e2d4a;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200}
.topbar-logo{font-size:12px;font-weight:700;letter-spacing:.1em;color:#3ecf70}
.topbar-center{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#e0e6f0;letter-spacing:.08em}
.topbar-right{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.badge-live{background:#3ecf7018;border:1px solid #3ecf7040;color:#3ecf70;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.blink{width:5px;height:5px;background:#3ecf70;border-radius:50%;animation:blink 1.2s ease-in-out infinite}

.tabs{border-bottom:1px solid #1e2d4a;padding:0 20px;display:flex;gap:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#6b8aaa;padding:11px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{border-bottom-color:#00d4aa;color:#00d4aa;font-size:12px}
.tab:hover:not(.active){color:#a0bcd4}

.content{max-width:1100px;margin:0 auto;padding:24px 20px}

/* Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-box{background:#0d1224;border:1px solid #1e2d4a;border-radius:10px;padding:14px 16px}
.kpi-label{color:#6b8aaa;font-size:11px;margin-bottom:5px}
.kpi-value{font-size:18px;font-weight:700}

.gate-banner{border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.gate-info{flex:1}
.gate-title{font-size:15px;font-weight:700;margin-bottom:3px}
.gate-comment{color:#8aa4c4;font-size:12px;line-height:1.7}
.gate-badges{display:flex;gap:8px}
.vix-badge{background:#060912;border-radius:8px;padding:8px 12px;text-align:center;min-width:68px}
.vix-label{font-size:10px;color:#6b8aaa;letter-spacing:1px}
.vix-val{font-size:18px;font-weight:700;line-height:1.2}
.vix-zone{font-size:10px;opacity:.9}
.action-badge{border-radius:8px;padding:8px 12px;text-align:center;min-width:100px;display:flex;flex-direction:column;justify-content:center}

.stock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.stock-card{background:#0d1224;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.stock-card:hover{transform:translateY(-1px)}
.grade-tag{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:1px}
.stock-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stock-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.stock-name{font-size:14px;font-weight:700}
.stock-meta{color:#6b8aaa;font-size:11px}
.stock-price{font-size:15px;font-weight:700}
.price-chg{font-size:11px;font-weight:700}
.criteria-bars{display:flex;gap:2px;margin:9px 0}
.criteria-bar{flex:1;height:3px;border-radius:2px}
.stock-summary{color:#a0b8ce;font-size:12px;line-height:1.6}
.click-hint{color:#6b8aaa;font-size:11px;margin-top:7px;text-align:right}

/* Score ring SVG handled inline */

/* Detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(6,9,18,.93);z-index:1000;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px}
.modal-box{background:#0a0e1a;border-radius:16px;width:100%;max-width:780px}
.modal-header{border-radius:16px 16px 0 0;padding:20px 24px;display:flex;align-items:center;gap:12px}
.modal-body{padding:22px}
.modal-section{background:#0d1224;border-radius:10px;padding:14px;margin-bottom:14px}
.modal-section-title{font-size:12px;font-weight:700;margin-bottom:10px}
.criteria-item{margin-bottom:10px}
.criteria-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.check-box{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.criteria-bar-track{background:#1e2d4a;border-radius:3px;height:4px;margin-bottom:3px}
.criteria-bar-fill{height:100%;border-radius:3px}
.bonus-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bonus-item{border-radius:8px;padding:9px 10px;text-align:center}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.two-col-section{border-radius:10px;padding:13px}

/* History */
.history-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-box{background:#0d1224;border:1px solid #1e2d4a;border-radius:10px;padding:12px 16px}
.stat-label{color:#6b8aaa;font-size:11px;margin-bottom:5px}
.stat-value{font-size:17px;font-weight:700}
.hist-group{background:#0d1224;border:1px solid #1e2d4a;border-radius:12px;margin-bottom:12px;overflow:hidden}
.hist-header{background:#060912;border-bottom:1px solid #1e2d4a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.hist-row{display:grid;grid-template-columns:28px 1fr 80px 70px 90px 100px 90px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #0d1830}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:20px}
.spinner{width:48px;height:48px;border-radius:50%;border:3px solid #1e2d4a;border-top-color:#00d4aa;animation:spin .9s linear infinite}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:18px;text-align:center}

/* VIX zones */
.vix-zones{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:12px}
.vix-zone-card{border-radius:12px;padding:14px}

/* Criteria */
.criteria-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.criteria-cat{background:#0d1224;border-radius:12px;padding:16px}
.criteria-item-box{background:#060912;border-radius:8px;padding:9px 11px;margin-bottom:7px}

/* Date selector */
.date-select{background:#0d1224;border:1px solid #1e2d4a;color:#e0e6f0;font-family:inherit;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer}

.btn{background:none;border:1px solid #1e2d4a;color:#8aa4c4;font-family:inherit;font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:#2e4060;color:#c0d4e8}
.btn-primary{background:linear-gradient(135deg,#00d4aa,#00a882);border:none;color:#0a0e1a;font-weight:700;padding:9px 20px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-primary:disabled{background:#1e2d4a;color:#4d6a8a;cursor:not-allowed}
.btn-danger{background:#ff6b6b10;border:1px solid #ff6b6b32;color:#ff6b6b;padding:6px 12px;font-size:10px}
</style>
</head>
<body>

<div class="topbar">
  <a href="https://mav-ash.com" class="topbar-logo">⬥ FORGE NEVER SLEEPS</a>
  <div class="topbar-center">
    <span>GOLDHALLOW</span>
    <span class="badge-live"><span class="blink"></span>LIVE</span>
  </div>
  <div class="topbar-right">
    <span style="font-size:10px;color:#4d6a8a" id="lastScan">—</span>
    <a href="https://mav-ash.com/dash" class="btn">⚡ 전력 대시보드</a>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('dashboard')" id="tab-dashboard">📊 오늘의 추천</button>
  <button class="tab" onclick="setTab('history')" id="tab-history">📁 추천 로그</button>
  <button class="tab" onclick="setTab('criteria')" id="tab-criteria">📋 스크리닝 기준</button>
  <button class="tab" onclick="setTab('vix')" id="tab-vix">📡 VIX 게이트</button>
</div>

<div class="content">
  <div id="pane-dashboard"></div>
  <div id="pane-history" style="display:none"></div>
  <div id="pane-criteria" style="display:none"></div>
  <div id="pane-vix" style="display:none"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────
const API = '';

const GRADE_CONFIG = {
  'A+': { color:'#00d4aa', bg:'#00d4aa18', label:'최우선 편입' },
  'A':  { color:'#4d9fff', bg:'#4d9fff18', label:'편입 권장' },
  'B':  { color:'#ffd166', bg:'#ffd16618', label:'조건부 편입' },
  'C':  { color:'#ff6b6b', bg:'#ff6b6b18', label:'편입 보류' },
};
const GATE_CONFIG = {
  GO_BONUS:   { color:'#00d4aa', label:'✅ OPTIMAL — 최적 작동',    action:'정상 스캔 · 보너스 +5pt' },
  GO:         { color:'#00d4aa', label:'✅ GO — 정상 작동',         action:'정상 스캔' },
  GO_CAUTION: { color:'#ffd166', label:'⚠️ ELEVATED — 신중 운용', action:'비중 30% 축소 권장' },
  PAUSE:      { color:'#6b8aaa', label:'⏸ DEAD CALM — 진입 보류', action:'신규 편입 중단' },
  STOP:       { color:'#ff6b6b', label:'🛑 PANIC — 전면 중단',     action:'신규 편입 금지' },
};
const CRITERIA_LIST = [
  {key:'market_cap',color:'#00d4aa'},{key:'debt_ratio',color:'#00d4aa'},{key:'operating_profit',color:'#00d4aa'},
  {key:'position_52w',color:'#4d9fff'},{key:'lr_slope',color:'#4d9fff'},{key:'ma200_dev',color:'#4d9fff'},
  {key:'hist_vol',color:'#ff6b6b'},{key:'dir_changes',color:'#ff6b6b'},{key:'rsi_range',color:'#ff6b6b'},
];
const BONUS_LIST = [
  {key:'dividend',label:'배당 이력'},{key:'kospi200',label:'KOSPI200'},
  {key:'foreign_ownership',label:'외국인 보유율'},{key:'trading_volume',label:'일평균 거래대금'},
];
const VIX_ZONES = [
  {label:'DEAD CALM',vix:'< 12',vkospi:'< 13',color:'#6b8aaa',action:'PAUSE',   desc:'변동성 소멸 — 매수 기회 희박'},
  {label:'OPTIMAL',  vix:'12~20',vkospi:'13~22',color:'#00d4aa',action:'GO +5pt',desc:'최적 진동 환경 — 적극 편입 · 보너스 +5pt'},
  {label:'ELEVATED', vix:'20~32',vkospi:'22~35',color:'#ffd166',action:'CAUTION',desc:'변동성 상승 — 비중 30% 축소'},
  {label:'PANIC',    vix:'> 32', vkospi:'> 35', color:'#ff6b6b',action:'STOP',   desc:'패닉 국면 — 신규 편입 전면 중단'},
];

// ── State ──────────────────────────────────────────────────
let currentTab = 'dashboard';
let scanData = null;
let historyData = [];

// ── Init ───────────────────────────────────────────────────
async function init() {
  await loadLatest();
  await loadHistory();
  renderCriteria();
  renderVix();
}

async function loadLatest() {
  showLoading('pane-dashboard');
  try {
    const r = await fetch(`${API}/api/magic-split/latest`);
    const j = await r.json();
    if (j.data) {
      scanData = j.data;
      document.getElementById('lastScan').textContent = '스캔: ' + (scanData.scan_date || '—');
      renderDashboard(scanData);
    } else {
      showEmpty('pane-dashboard');
    }
  } catch(e) {
    showError('pane-dashboard', e.message);
  }
}

async function loadHistory() {
  try {
    const r = await fetch(`${API}/api/magic-split/history`);
    const j = await r.json();
    historyData = j.data || [];
    document.getElementById('tab-history').textContent =
      `📁 추천 로그${historyData.length > 0 ? ' (' + historyData.length + ')' : ''}`;
  } catch(e) {}
}

// ── Tabs ───────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ['dashboard','history','criteria','vix'].forEach(t => {
    document.getElementById('pane-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'history') renderHistory();
}

// ── Score Ring SVG ─────────────────────────────────────────
function scoreRing(score, size=56, color='#00d4aa') {
  const r = (size-8)/2, circ = 2*Math.PI*r, pct = Math.min(score,110)/110;
  return `<svg width="${size}" height="${size}" style="flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e2d4a" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${pct*circ} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+1}" text-anchor="middle" dominant-baseline="middle"
      fill="${color}" font-size="${size<50?11:13}" font-weight="700" font-family="IBM Plex Mono,monospace">${score}</text>
  </svg>`;
}

// ── Gate Banner ────────────────────────────────────────────
function gateBannerHTML(gate) {
  const cfg = GATE_CONFIG[gate.overall_status] || GATE_CONFIG['GO'];
  const getC = (z) => (VIX_ZONES.find(v=>v.label===z||v.label.replace(' ','_')===z)||{color:'#00d4aa'}).color;
  return `
  <div class="gate-banner" style="background:linear-gradient(135deg,${cfg.color}14,#0d1224);border:1px solid ${cfg.color}42">
    <div class="gate-info">
      <div class="gate-title" style="color:${cfg.color}">${cfg.label}</div>
      <div class="gate-comment">${gate.gate_comment||''}</div>
    </div>
    <div class="gate-badges">
      ${['vix','vkospi'].map(k=>`
      <div class="vix-badge" style="border:1px solid ${getC(gate[k+'_zone'])}32">
        <div class="vix-label">${k.toUpperCase()}</div>
        <div class="vix-val" style="color:${getC(gate[k+'_zone'])}">${(gate[k]||0).toFixed(1)}</div>
        <div class="vix-zone" style="color:${getC(gate[k+'_zone'])}">${(gate[k+'_zone']||'').replace('_',' ')}</div>
      </div>`).join('')}
      <div class="action-badge" style="background:${cfg.color}10;border:1px solid ${cfg.color}32">
        <div style="color:#4d6a8a;font-size:9px;letter-spacing:1px">ACTION</div>
        <div style="color:${cfg.color};font-size:11px;font-weight:700">${cfg.action}</div>
      </div>
    </div>
  </div>`;
}

// ── Stock Card ─────────────────────────────────────────────
function stockCardHTML(s) {
  const g = GRADE_CONFIG[s.grade] || GRADE_CONFIG['A'];
  const base = Object.values(s.criteria_detail||{}).reduce((a,c)=>a+(c.score||0),0);
  const bonus = Object.values(s.bonus_detail||{}).reduce((a,b)=>a+(b.score||0),0);
  const isUp = (s.price_change_pct||0) >= 0;
  const bars = CRITERIA_LIST.map(c => {
    const d = (s.criteria_detail||{})[c.key];
    return `<div class="criteria-bar" style="background:${d&&d.pass?c.color:'#1e2d4a'};opacity:${d&&d.pass?1:0.3}"></div>`;
  }).join('');
  return `
  <div class="stock-card" style="border:1px solid ${g.color}25" 
    onmouseenter="this.style.borderColor='${g.color}65';this.style.background='${g.bg}'"
    onmouseleave="this.style.borderColor='${g.color}25';this.style.background='#0d1224'"
    onclick="openModal(${JSON.stringify(JSON.stringify(s))})">
    <div class="grade-tag" style="background:${g.bg};color:${g.color}">${s.grade} · ${g.label}</div>
    <div class="stock-header">
      <div class="stock-rank" style="background:${g.color}1e;color:${g.color}">#${s.rank}</div>
      <div style="flex:1">
        <div class="stock-name">${s.name}</div>
        <div class="stock-meta">${s.ticker} · ${s.sector}</div>
      </div>
      ${scoreRing(s.score, 46, g.color)}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
      <div>
        <div class="stock-price">₩${(s.current_price||0).toLocaleString()}</div>
        <div class="price-chg" style="color:${isUp?'#ff6b6b':'#4d9fff'}">${isUp?'▲':'▼'} ${Math.abs(s.price_change_pct||0).toFixed(1)}%</div>
      </div>
      <div style="text-align:right">
        <div style="color:#4d6a8a;font-size:9px;margin-bottom:2px">기본 + 보너스</div>
        <span style="color:${g.color};font-weight:700;font-size:11px">${base}pt</span>
        <span style="color:#ffd166;font-size:11px"> +${bonus}pt</span>
      </div>
    </div>
    <div class="criteria-bars">${bars}</div>
    <div class="stock-summary">${s.summary||''}</div>
    <div class="click-hint">클릭하여 상세 분석 →</div>
  </div>`;
}

// ── Dashboard ──────────────────────────────────────────────
function renderDashboard(data) {
  if (!data) { showEmpty('pane-dashboard'); return; }
  const el = document.getElementById('pane-dashboard');
  el.innerHTML = gateBannerHTML(data.market_gate||{}) +
    `<div class="stock-grid">${(data.recommendations||[]).map(stockCardHTML).join('')}</div>`;
}

// ── Modal ──────────────────────────────────────────────────
function openModal(jsonStr) {
  const s = JSON.parse(jsonStr);
  const g = GRADE_CONFIG[s.grade] || GRADE_CONFIG['A'];
  const base = Object.values(s.criteria_detail||{}).reduce((a,c)=>a+(c.score||0),0);
  const bonus = Object.values(s.bonus_detail||{}).reduce((a,b)=>a+(b.score||0),0);
  const isUp = (s.price_change_pct||0) >= 0;

  const criteriaSection = (title, keys, color) => `
    <div style="background:#0d1224;border:1px solid ${color}18;border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="color:${color};font-size:12px;font-weight:700;margin-bottom:10px">${title}</div>
      ${keys.map(k=>{
        const c = CRITERIA_LIST.find(x=>x.key===k);
        const d = (s.criteria_detail||{})[k];
        if(!d) return '';
        return `<div class="criteria-item">
          <div class="criteria-row">
            <div style="display:flex;align-items:center;gap:6px">
              <div class="check-box" style="background:${d.pass?color+'30':'#1e2d4a'};border:1px solid ${d.pass?color:'#2e4060'};color:${d.pass?color:'#4d6a8a'}">${d.pass?'✓':'✗'}</div>
              <span style="font-size:11px;font-weight:700">${d.value||''}</span>
            </div>
            <span style="color:${d.pass?color:'#4d6a8a'};font-size:11px;font-weight:700">${d.score}/${d.max_score}pt</span>
          </div>
          <div class="criteria-bar-track"><div class="criteria-bar-fill" style="background:${d.pass?color:'#2e4060'};width:${(d.score/d.max_score)*100}%"></div></div>
          ${d.reason?`<div style="color:#4d6a8a;font-size:10px;margin-left:20px">${d.reason}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;

  document.getElementById('modal-box').innerHTML = `
    <div class="modal-header" style="background:linear-gradient(135deg,${g.color}12,#0d1224);border-bottom:1px solid ${g.color}25">
      ${scoreRing(s.score, 66, g.color)}
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
          <span style="font-size:19px;font-weight:700">${s.name}</span>
          <span style="background:${g.bg};color:${g.color};font-size:11px;font-weight:700;padding:2px 9px;border-radius:4px">${s.grade} · ${g.label}</span>
        </div>
        <div style="color:#4d6a8a;font-size:11px">${s.ticker} · ${s.sector}</div>
        <div style="display:flex;gap:12px;margin-top:4px">
          <span style="font-size:15px;font-weight:700">₩${(s.current_price||0).toLocaleString()}</span>
          <span style="color:${isUp?'#ff6b6b':'#4d9fff'};font-size:11px;font-weight:700">${isUp?'▲':'▼'} ${Math.abs(s.price_change_pct||0).toFixed(1)}%</span>

// ── History ────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('pane-history');
  if (!historyData.length) {
    el.innerHTML = `<div class="empty-state">
      <div style="font-size:40px">📁</div>
      <div style="color:#e0e6f0;font-size:14px;font-weight:700">아직 추천 기록이 없습니다</div>
      <div style="color:#4d6a8a;font-size:12px">Python 스캐너를 실행하면 기록이 쌓입니다</div>
    </div>`;
    return;
  }

  const allReturns = historyData.filter(h=>h.return_1m!=null).map(h=>h.return_1m);
  const avgReturn = allReturns.length ? allReturns.reduce((a,b)=>a+b,0)/allReturns.length : null;
  const winRate   = allReturns.length ? allReturns.filter(r=>r>0).length/allReturns.length*100 : null;

  // Group by date
  const grouped = {};
  historyData.forEach(h => { if(!grouped[h.scan_date]) grouped[h.scan_date]=[]; grouped[h.scan_date].push(h); });
  const dates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  const statsHTML = `<div class="history-stats">
    ${[
      {label:'총 추천 횟수',  value:historyData.length+'건', color:'#e0e6f0'},
      {label:'수익률 측정 완료', value:allReturns.length+'건', color:'#4d9fff'},
      {label:'평균 1개월 수익률', value:avgReturn!=null?`${avgReturn>=0?'▲':'▼'}${Math.abs(avgReturn).toFixed(1)}%`:'집계중',
        color:avgReturn==null?'#4d6a8a':avgReturn>=0?'#00d4aa':'#ff6b6b'},
      {label:'승률 (수익>0)', value:winRate!=null?`${winRate.toFixed(0)}%`:'집계중',
        color:winRate==null?'#4d6a8a':winRate>=60?'#00d4aa':winRate>=40?'#ffd166':'#ff6b6b'},
    ].map(s=>`<div class="stat-box"><div class="stat-label">${s.label}</div><div class="stat-value" style="color:${s.color}">${s.value}</div></div>`).join('')}
  </div>`;

  const groupsHTML = dates.map(date => {
    const items = grouped[date];
    const done  = items.filter(i=>i.return_1m!=null);
    const avgD  = done.length ? done.reduce((a,i)=>a+i.return_1m,0)/done.length : null;
    const rows  = items.sort((a,b)=>b.score-a.score).map(item=>{
      const g = GRADE_CONFIG[item.grade]||GRADE_CONFIG['A'];
      const hasReturn = item.return_1m != null;
      const daysSince = Math.max(0, Math.floor((Date.now()-new Date(item.scan_date).getTime())/(24*60*60*1000)));
      const retColor  = !hasReturn?'#4d6a8a':item.return_1m>=5?'#00d4aa':item.return_1m>=0?'#4d9fff':'#ff6b6b';
      const retVal    = hasReturn ? `<span style="color:${retColor};font-weight:700;font-size:12px">${item.return_1m>=0?'▲':'▼'}${Math.abs(item.return_1m).toFixed(1)}%</span>` : `<span style="color:#4d6a8a;font-size:11px">대기중</span>`;
      return `<div class="hist-row">
        <div style="color:${g.color};font-size:11px;font-weight:700;text-align:center">#${item.rank||'-'}</div>
        <div><span style="font-size:12px;font-weight:700">${item.name}</span><span style="color:#4d6a8a;font-size:10px;margin-left:6px">${item.ticker}</span></div>
        <div style="text-align:center"><span style="background:${g.bg};color:${g.color};font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px">${item.grade}</span></div>
        <div style="color:${g.color};font-size:12px;font-weight:700;text-align:center">${item.score}pt</div>
        <div style="text-align:right"><div style="color:#4d6a8a;font-size:9px">진입가</div><div style="font-size:11px;font-weight:700">₩${(item.entry_price||0).toLocaleString()}</div></div>
        <div style="text-align:right">
          ${hasReturn ? `<div style="color:#4d6a8a;font-size:9px">1개월 후가</div><div style="font-size:11px;font-weight:700">₩${(item.exit_price||0).toLocaleString()}</div>` :
            `<div style="color:#4d6a8a;font-size:9px">D+${daysSince}/D+30</div><div style="background:#1e2d4a;border-radius:3px;height:4px;margin-top:4px"><div style="background:#4d9fff;height:100%;width:${Math.min(daysSince/30*100,100)}%;border-radius:3px"></div></div>`}
        </div>
        <div style="text-align:right"><div style="color:#4d6a8a;font-size:9px">1개월 수익률</div>${retVal}</div>
      </div>`;
    }).join('');
    return `<div class="hist-group">
      <div class="hist-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="color:#4d9fff;font-size:12px;font-weight:700">📅 ${date}</span>
          <span style="color:#4d6a8a;font-size:10px">추천 ${items.length}종목</span>
          ${items[0]?.gate_status?`<span style="background:#4d9fff18;color:#4d9fff;font-size:9px;padding:1px 7px;border-radius:3px">${items[0].gate_status}</span>`:''}
        </div>
        ${avgD!=null?`<div><span style="color:#4d6a8a;font-size:10px;margin-right:8px">이 날 평균</span><span style="color:${avgD>=0?'#00d4aa':'#ff6b6b'};font-weight:700;font-size:12px">${avgD>=0?'▲':'▼'}${Math.abs(avgD).toFixed(1)}%</span></div>`:''}
      </div>
      ${rows}
    </div>`;
  }).join('');

  el.innerHTML = statsHTML + groupsHTML;
}

        매직스플릿이 망가지는 시나리오는 단 하나 — 모든 종목이 같이 떨어질 때입니다. VIX/VKOSPI는 그 신호를 가장 빠르게 알려줍니다.
        <span style="color:#00d4aa">OPTIMAL 국면일 때만 보너스 +5pt</span>를 반영하고,
        <span style="color:#ff6b6b">둘 중 하나라도 PANIC이면 신규 편입 전면 중단</span>이 원칙입니다.
      </div>
    </div>
    <div class="vix-zones">
      ${VIX_ZONES.map(z=>`
      <div class="vix-zone-card" style="background:${z.color}0d;border:1px solid ${z.color}30">
        <div style="color:${z.color};font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:7px">${z.label}</div>
        <div style="margin-bottom:5px"><div style="color:#8aa4c4;font-size:11px">VIX</div><div style="color:#e0e6f0;font-size:20px;font-weight:700">${z.vix}</div></div>
        <div style="margin-bottom:8px"><div style="color:#8aa4c4;font-size:11px">VKOSPI</div><div style="color:#e0e6f0;font-size:15px;font-weight:700">${z.vkospi}</div></div>
        <div style="background:${z.color}18;color:${z.color};border-radius:4px;padding:2px 7px;font-size:12px;font-weight:700;margin-bottom:7px">${z.action}</div>
        <div style="color:#8aa4c4;font-size:12px;line-height:1.7">${z.desc}</div>
      </div>`).join('')}
    </div>
    <div style="background:#060912;border:1px solid #1e2d4a;border-radius:12px;padding:16px">
      <div style="color:#4d9fff;font-size:13px;font-weight:700;margin-bottom:9px">🖥️ 매일 08:30 자동 실행 (맥미니)</div>
      <pre style="margin:0;font-size:12px;line-height:1.9;color:#a0b8ce;overflow-x:auto">cron: 30 8 * * 1-5 cd ~/FORGE/power-dashboard && python3 magic_split_scanner.py

데이터 소스:
  yfinance           → VIX, VKOSPI, 주가/기술지표
  FinanceDataReader  → KOSPI 유니버스 (시총상위 100 + 재무우량 100)
  API 비용           → 0원 (완전 무료)
  최종 추천          → 상위 12종목 (가격 5,000~80,000원 필터 적용)</pre>
    </div>`;
}

// ── Helpers ────────────────────────────────────────────────
function showLoading(paneId) {
  document.getElementById(paneId).innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div style="color:#4d6a8a;font-size:12px">데이터 로드 중...</div></div>`;
}
function showEmpty(paneId) {
  document.getElementById(paneId).innerHTML = `
    <div class="empty-state">
      <div style="font-size:48px">📊</div>
      <div style="color:#e0e6f0;font-size:16px;font-weight:700">스캔 결과가 없습니다</div>
      <div style="color:#4d6a8a;font-size:13px;line-height:1.9;max-width:400px">
        맥미니에서 스캐너를 실행하면 결과가 여기에 표시됩니다.<br>
        <code style="color:#3ecf70">python3 magic_split_scanner.py</code>
      </div>
    </div>`;
}
function showError(paneId, msg) {
  document.getElementById(paneId).innerHTML = `
    <div style="background:#ff6b6b10;border:1px solid #ff6b6b30;border-radius:12px;padding:20px;color:#ff6b6b;font-size:12px">
      ⚠️ 오류: ${msg}<br><span style="color:#4d6a8a;font-size:10px;margin-top:6px;display:block">맥미니 서버가 켜져 있는지 확인해주세요.</span>
    </div>`;
}

// ── Start ──────────────────────────────────────────────────
init();
</script>
</body>
