<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLDHALLOW — Forge Never Sleeps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#e0e6f0;font-family:'Noto Sans KR','IBM Plex Mono','Courier New',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d1224}::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Layout */
.topbar{height:44px;background:#0d1224;border-bottom:1px solid #1e2d4a;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200}
.topbar-logo{font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.14em;color:#3ecf70;text-decoration:none}
.topbar-center{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#e0e6f0;letter-spacing:.08em}
.topbar-right{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.badge-live{background:#3ecf7018;border:1px solid #3ecf7040;color:#3ecf70;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.blink{width:5px;height:5px;background:#3ecf70;border-radius:50%;animation:blink 1.2s ease-in-out infinite}

.tabs{border-bottom:1px solid #1e2d4a;padding:0 20px;display:flex;gap:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#6b8aaa;padding:11px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.active{border-bottom-color:#00d4aa;color:#00d4aa;font-size:12px}
.tab:hover:not(.active){color:#a0bcd4}

.content{max-width:1100px;margin:0 auto;padding:24px 20px}

/* Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-box{background:#0d1224;border:1px solid #1e2d4a;border-radius:10px;padding:14px 16px}
.kpi-label{color:#6b8aaa;font-size:11px;margin-bottom:5px}
.kpi-value{font-size:18px;font-weight:700}

.gate-banner{border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px}
.gate-info{flex:1}
.gate-title{font-size:15px;font-weight:700;margin-bottom:3px}
.gate-comment{color:#8aa4c4;font-size:12px;line-height:1.7}
.gate-badges{display:flex;gap:8px}
.vix-badge{background:#060912;border-radius:8px;padding:8px 12px;text-align:center;min-width:68px}
.vix-label{font-size:10px;color:#6b8aaa;letter-spacing:1px}
.vix-val{font-size:18px;font-weight:700;line-height:1.2}
.vix-zone{font-size:10px;opacity:.9}
.action-badge{border-radius:8px;padding:8px 12px;text-align:center;min-width:100px;display:flex;flex-direction:column;justify-content:center}

.stock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.stock-card{background:#0d1224;border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.stock-card:hover{transform:translateY(-1px)}
.grade-tag{position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:1px}
.stock-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stock-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.stock-name{font-size:14px;font-weight:700}
.stock-meta{color:#6b8aaa;font-size:11px}
.stock-price{font-size:15px;font-weight:700}
.price-chg{font-size:11px;font-weight:700}
.criteria-bars{display:flex;gap:1px;margin:9px 0;flex-wrap:wrap}
.criteria-bar{width:20px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;line-height:1;font-family:'IBM Plex Mono',monospace}
.stock-summary{color:#a0b8ce;font-size:12px;line-height:1.6}
.click-hint{color:#6b8aaa;font-size:11px;margin-top:7px;text-align:right}

/* Score ring SVG handled inline */

/* Detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(6,9,18,.93);z-index:1000;overflow-y:auto;display:flex;justify-content:center;align-items:flex-start;padding:28px 16px}
.modal-box{background:#0a0e1a;border-radius:16px;width:100%;max-width:780px}
.modal-header{border-radius:16px 16px 0 0;padding:20px 24px;display:flex;align-items:center;gap:12px}
.modal-body{padding:22px}
.modal-section{background:#0d1224;border-radius:10px;padding:14px;margin-bottom:14px}
.modal-section-title{font-size:12px;font-weight:700;margin-bottom:10px}
.criteria-item{margin-bottom:10px}
.criteria-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.check-box{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.criteria-bar-track{background:#1e2d4a;border-radius:3px;height:4px;margin-bottom:3px}
.criteria-bar-fill{height:100%;border-radius:3px}
.bonus-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.bonus-item{border-radius:8px;padding:9px 10px;text-align:center}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.two-col-section{border-radius:10px;padding:13px}

/* History */
.history-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-box{background:#0d1224;border:1px solid #1e2d4a;border-radius:10px;padding:12px 16px}
.stat-label{color:#6b8aaa;font-size:11px;margin-bottom:5px}
.stat-value{font-size:17px;font-weight:700}
.hist-group{background:#0d1224;border:1px solid #1e2d4a;border-radius:12px;margin-bottom:12px;overflow:hidden}
.hist-header{background:#060912;border-bottom:1px solid #1e2d4a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.hist-row{display:grid;grid-template-columns:28px 1fr 80px 70px 90px 100px 90px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #0d1830}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:20px}
.spinner{width:48px;height:48px;border-radius:50%;border:3px solid #1e2d4a;border-top-color:#00d4aa;animation:spin .9s linear infinite}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:18px;text-align:center}

/* VIX zones */
.vix-zones{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:12px}
.vix-zone-card{border-radius:12px;padding:14px}

/* Criteria */
.criteria-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.criteria-cat{background:#0d1224;border-radius:12px;padding:16px}
.criteria-item-box{background:#060912;border-radius:8px;padding:9px 11px;margin-bottom:7px}

/* Market section */
.market-section{margin-bottom:28px}
.market-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1e2d4a}
.market-label{font-size:13px;font-weight:700;letter-spacing:.1em}
.market-count{font-size:11px;color:#6b8aaa;background:#0d1224;border:1px solid #1e2d4a;padding:2px 8px;border-radius:4px}
.market-warning{background:#ff6b6b0d;border:1px solid #ff6b6b28;border-radius:8px;padding:9px 13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;font-size:11px;color:#ff9090;line-height:1.6}

/* Date selector */
.date-select{background:#0d1224;border:1px solid #1e2d4a;color:#e0e6f0;font-family:inherit;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer}

.btn{background:none;border:1px solid #1e2d4a;color:#8aa4c4;font-family:inherit;font-size:11px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:#2e4060;color:#c0d4e8}
.btn-primary{background:linear-gradient(135deg,#00d4aa,#00a882);border:none;color:#0a0e1a;font-weight:700;padding:9px 20px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-primary:disabled{background:#1e2d4a;color:#4d6a8a;cursor:not-allowed}
.btn-danger{background:#ff6b6b10;border:1px solid #ff6b6b32;color:#ff6b6b;padding:6px 12px;font-size:10px}

/* Mobile responsive */
@media(max-width:768px){
  .hide-mobile{display:none!important}
  .topbar{grid-template-columns:auto 1fr auto;padding:0 12px}
  .topbar-center{justify-content:center}
  .topbar-right{gap:6px}
  .tabs{padding:0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{padding:10px 12px;font-size:11px;white-space:nowrap}
  .content{padding:14px 12px}
  .stock-grid{grid-template-columns:1fr!important;gap:12px}
  .stock-card{padding:18px 16px}
  .stock-header{margin-bottom:12px}
  .stock-name{font-size:15px}
  .stock-meta{font-size:12px}
  .stock-price{font-size:17px}
  .grade-tag{font-size:11px;padding:3px 10px}
  .criteria-bars{margin:12px 0}
  .stock-summary{font-size:13px;line-height:1.7}
  .click-hint{font-size:12px;margin-top:10px}
  .gate-banner{flex-direction:column;align-items:stretch;padding:14px}
  .gate-title{font-size:14px}
  .gate-comment{font-size:13px}
  .gate-badges{flex-wrap:wrap;justify-content:center}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .history-stats{grid-template-columns:repeat(2,1fr)}
  .hist-row{grid-template-columns:24px 1fr 50px 50px;font-size:10px;padding:8px 10px}
  .hist-row>div:nth-child(5),.hist-row>div:nth-child(6){display:none}
  .vix-zones{grid-template-columns:repeat(2,1fr)}
  .criteria-5col{grid-template-columns:1fr!important}
  .resp-2col{grid-template-columns:1fr!important}
  .modal-overlay{padding:10px 8px}
  .modal-header{flex-wrap:wrap;padding:14px 16px;gap:8px}
  .modal-body{padding:14px}
  .modal-body .two-col{grid-template-columns:1fr}
  .modal-2col{grid-template-columns:1fr}
  .bonus-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
  .topbar-center span:first-child{font-size:11px}
  .criteria-bars{gap:1px}
  .criteria-bar{width:18px;height:14px;font-size:7px}
}
.gold-dwarf{position:fixed;bottom:0;left:16px;width:100px;z-index:150;pointer-events:none;opacity:.85;transition:opacity .4s,transform .3s}
.gold-dwarf:hover{opacity:1;transform:translateY(-4px)}
.gold-dwarf.hidden{display:none}
@media(max-width:1024px){.gold-dwarf{display:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <a href="https://mav-ash.com" class="topbar-logo">⬥ FORGE<span class="hide-mobile"> NEVER SLEEPS</span></a>
  <div class="topbar-center">
    <span>GOLDHALLOW</span>
    <span class="badge-live"><span class="blink"></span>LIVE</span>
  </div>
  <div class="topbar-right">
    <span style="font-size:10px;color:#4d6a8a" id="lastScan">—</span>
    <a href="https://mav-ash.com/dash" class="btn hide-mobile">⚡ 전력 대시보드</a>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('dashboard')" id="tab-dashboard">📊 오늘의 추천</button>
  <button class="tab" onclick="setTab('history')" id="tab-history">📁 추천 로그</button>
  <button class="tab" onclick="setTab('criteria')" id="tab-criteria">📋 스크리닝 기준</button>
  <button class="tab" onclick="setTab('vix')" id="tab-vix">📡 VIX 게이트</button>
</div>

<div class="content">
  <div id="pane-dashboard"></div>
  <div id="pane-history" style="display:none"></div>
  <div id="pane-criteria" style="display:none"></div>
  <div id="pane-vix" style="display:none"></div>
</div>

<img id="goldDwarf" class="gold-dwarf" src="gold_dwarf_full.png" alt="Gold Dwarf" />
<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────
const API = 'https://api.mav-ash.com';

const GRADE_CONFIG = {
  'A+': { color:'#00d4aa', bg:'#00d4aa18', label:'최우선 편입' },
  'A':  { color:'#4d9fff', bg:'#4d9fff18', label:'편입 권장' },
  'B':  { color:'#ffd166', bg:'#ffd16618', label:'조건부 편입' },
  'C':  { color:'#ff6b6b', bg:'#ff6b6b18', label:'편입 보류' },
};
const GATE_CONFIG = {
  GO_BONUS:   { color:'#00d4aa', label:'✅ OPTIMAL — 최적 작동',    action:'정상 스캔 · 보너스 +5pt' },
  GO:         { color:'#00d4aa', label:'✅ GO — 정상 작동',         action:'정상 스캔' },
  GO_CAUTION: { color:'#ffd166', label:'⚠️ ELEVATED — 신중 운용', action:'비중 30% 축소 권장' },
  PAUSE:      { color:'#6b8aaa', label:'⏸ DEAD CALM — 진입 보류', action:'신규 편입 중단' },
  STOP:       { color:'#ff6b6b', label:'🛑 PANIC — 전면 중단',     action:'신규 편입 금지' },
};
const CRITERIA_LIST = [
  // 💰 가치 지표 (5)
  {id:1, key:'per',color:'#00d4aa',label:'PER'},{id:2, key:'pbr',color:'#00d4aa',label:'PBR'},{id:3, key:'psr',color:'#00d4aa',label:'PSR'},{id:4, key:'pcr',color:'#00d4aa',label:'PCR'},{id:5, key:'peg',color:'#00d4aa',label:'PEG'},
  // 📈 수익성·성장성 (6)
  {id:6, key:'roe',color:'#4d9fff',label:'ROE'},{id:7, key:'roa',color:'#4d9fff',label:'ROA'},{id:8, key:'op_margin',color:'#4d9fff',label:'영업이익률'},{id:9, key:'net_margin',color:'#4d9fff',label:'순이익률'},{id:10,key:'rev_growth',color:'#4d9fff',label:'매출증가'},{id:11,key:'net_inc_growth',color:'#4d9fff',label:'순이익증가'},
  // 🏦 재무 안정성 (4)
  {id:12,key:'market_cap',color:'#ffd166',label:'시가총액'},{id:13,key:'price_range',color:'#ffd166',label:'주가범위'},{id:14,key:'debt_ratio',color:'#ffd166',label:'부채비율'},{id:15,key:'current_ratio',color:'#ffd166',label:'유동비율'},
  // 📍 주가 위치 (4)
  {id:16,key:'pos_from_52w_low',color:'#a78bfa',label:'52주저가'},{id:17,key:'pos_from_52w_high',color:'#a78bfa',label:'52주고가'},{id:18,key:'dividend_yield',color:'#a78bfa',label:'배당률'},{id:19,key:'foreign_ownership',color:'#a78bfa',label:'외국인'},
  // 〰️ 오실레이션 (2)
  {id:20,key:'hist_vol',color:'#ff6b6b',label:'변동성'},{id:21,key:'dir_changes',color:'#ff6b6b',label:'방향전환'},
];
const BONUS_LIST = [
  {key:'checklist',label:'체크리스트 보너스'},{key:'vix_optimal',label:'VIX OPTIMAL'},
  {key:'rsi_dip',label:'RSI 매수 타이밍'},{key:'near_52w_low',label:'52주 저가 근접'},
];
const VIX_ZONES = [
  {label:'DEAD CALM',vix:'< 12',vkospi:'< 13',color:'#6b8aaa',action:'PAUSE',   desc:'변동성 소멸 — 매수 기회 희박'},
  {label:'OPTIMAL',  vix:'12~20',vkospi:'13~22',color:'#00d4aa',action:'GO +5pt',desc:'최적 진동 환경 — 적극 편입 · 보너스 +5pt'},
  {label:'ELEVATED', vix:'20~32',vkospi:'22~35',color:'#ffd166',action:'CAUTION',desc:'변동성 상승 — 비중 30% 축소'},
  {label:'PANIC',    vix:'> 32', vkospi:'> 35', color:'#ff6b6b',action:'STOP',   desc:'패닉 국면 — 신규 편입 전면 중단'},
];

// ── State ──────────────────────────────────────────────────
let currentTab = 'dashboard';
let scanData = null;
let historyData = [];
let stockList = [];
let aiReports = [];
let changesData = null;

// ── Init ───────────────────────────────────────────────────
async function init() {
  await loadChanges();
  await loadAiReports();
  await loadLatest();
  await loadHistory();
  renderCriteria();
  renderVix();
}

async function loadLatest() {
  showLoading('pane-dashboard');
  try {
    const r = await fetch(`${API}/api/magic-split/latest`);
    const j = await r.json();
    if (j.data) {
      scanData = j.data;
      document.getElementById('lastScan').textContent = '스캔: ' + (scanData.scan_date || '—');
      renderDashboard(scanData);
    } else {
      showEmpty('pane-dashboard');
    }
  } catch(e) {
    showError('pane-dashboard', e.message);
  }
}

async function loadHistory() {
  try {
    const r = await fetch(`${API}/api/magic-split/history`);
    const j = await r.json();
    historyData = j.data || [];
    const uniqueStocks = [...new Set(historyData.map(h=>h.ticker))].length;
    document.getElementById('tab-history').textContent =
      `📁 추천 로그${uniqueStocks > 0 ? ' (' + uniqueStocks + '종목)' : ''}`;
  } catch(e) {}
}

async function loadAiReports() {
  try {
    const r = await fetch(`${API}/api/magic-split/ai-report`);
    const j = await r.json();
    aiReports = (j.data && j.data.reports) ? j.data.reports : [];
  } catch(e) { aiReports = []; }
}

async function loadChanges() {
  try {
    const r = await fetch(`${API}/api/magic-split/changes`);
    const j = await r.json();
    changesData = j.data || null;
  } catch(e) { changesData = null; }
}

function renderChanges() {
  if (!changesData || changesData.unchanged) return '';
  const cd=changesData.cur_date||'';
  const pd=changesData.prev_date||'';
  let h='<div style="margin-top:24px;border-top:2px solid #a78bfa30;padding-top:18px">';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">';
  h+='<span style="color:#a78bfa;font-size:15px;font-weight:800">📋 주간 변동</span>';
  h+='<span style="color:#4d6a8a;font-size:12px">('+pd+' → '+cd+')</span></div>';
  if(changesData.added&&changesData.added.length){
    h+='<div style="color:#00d4aa;font-size:13px;font-weight:700;margin-bottom:8px">📥 신규 편입 ('+changesData.added.length+'종목)</div>';
    changesData.added.forEach(s=>{
      h+='<div style="background:#00d4aa08;border:1px solid #00d4aa20;border-radius:8px;padding:10px 14px;margin-bottom:6px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<span style="color:#00d4aa;font-size:13px;font-weight:700">🟢 '+s.name+'</span>';
      h+='<span style="color:#00d4aa;font-size:12px">'+s.score+'pt ['+s.grade+']</span></div>';
      h+='<div style="color:#8aa4c4;font-size:12px;margin-top:4px;line-height:1.7">'+(s.summary||'')+'</div></div>';
    });
  }
  if(changesData.removed&&changesData.removed.length){
    h+='<div style="color:#ff6b6b;font-size:13px;font-weight:700;margin-bottom:8px;margin-top:12px">📤 방출 ('+changesData.removed.length+'종목)</div>';
    changesData.removed.forEach(s=>{
      h+='<div style="background:#ff6b6b08;border:1px solid #ff6b6b20;border-radius:8px;padding:10px 14px;margin-bottom:6px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<span style="color:#ff6b6b;font-size:13px;font-weight:700">🔴 '+s.name+'</span>';
      h+='<span style="color:#ff6b6b;font-size:12px">'+s.score+'pt ['+s.grade+']</span></div>';
      h+='<div style="color:#8aa4c4;font-size:12px;margin-top:4px;line-height:1.7">'+(s.summary||'')+'</div></div>';
    });
  }
  h+='</div>';
  return h;
}

function isNewStock(ticker) {

}

function buildNumberTable(aiRpt, currentPrice) {
  if (!aiRpt) return '';
  const maxN = parseInt(aiRpt.max_number) || 7;
  const buyPct = aiRpt.buy_interval_pct || '';
  const sellPct = aiRpt.sell_target_pct || '';
  // 넘버별 가격 계산
  let prices = [currentPrice];
  // entry_range에서 파싱 시도
  const entryMatch = (aiRpt.entry_range||'').match(/N\d+[:\s]*[\d,]+/g);
  if (entryMatch && entryMatch.length > 1) {
    prices = entryMatch.map(m => parseInt(m.replace(/[^\d]/g,'')));
  } else {
    // 3% 간격으로 직접 계산
    for (let i = 1; i < maxN; i++) {
      const gap = i < 4 ? 0.03 : (i < 6 ? 0.05 : 0.10);
      prices.push(Math.round(prices[i-1] * (1 - gap)));
    }
  }
  // 차수별 매수간격/매도목표 파싱
  function getPct(text, idx, total) {
    if (!text) return '-';
    // Pattern 1: "N1: X%, N2~N7: Y%" — N1만 다른 경우
    const n1Pat = text.match(/N1[:\s]+(\d+\.?\d*)%[\s\S]*?N2[^%]*?(\d+\.?\d*)%/);
    if (n1Pat) return (idx === 0 ? n1Pat[1] : n1Pat[2]) + '%';
    // Pattern 2: "X% (단, 넘버1은 Y% 이상)" — N1 목표가 더 높은 경우
    const nb1 = text.match(/(\d+\.?\d*)%[^%]*?넘버1은\s*(\d+\.?\d*)%/);
    if (nb1) return (idx === 0 ? nb1[2] : nb1[1]) + '%';
    // Pattern 3: "N2~N4: X%, N5~N7: Y%" — 명시적 범위
    const rangeRe = /N(\d+)[~\-]N(\d+)[:\s]+(\d+\.?\d*)%/g;
    const ranges = [];
    let m;
    while ((m = rangeRe.exec(text)) !== null)
      ranges.push({ s: parseInt(m[1])-1, e: parseInt(m[2])-1, v: m[3] });
    if (ranges.length > 0) {
      const hit = ranges.find(r => idx >= r.s && idx <= r.e);
      return (hit ? hit.v : ranges[0].v) + '%';
    }
    // 기본: 숫자 추출 후 절반 기준 분기
    const nums = text.match(/\d+\.?\d*(?=%)/g);
    if (!nums) {
      const bare = text.match(/(\d+\.?\d*)/);
      if (bare) return bare[1] + '%';
      return '-';
    }
    if (nums.length === 1) return nums[0] + '%';
    const mid = Math.ceil(total / 2);
    return (idx < mid ? nums[0] : nums[1]) + '%';
  }
  let html = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
  html += '<tr style="border-bottom:1px solid #1e2d4a">';
  html += '<th style="padding:7px 6px;text-align:center;color:#6b8aaa;font-weight:700">차수</th>';
  html += '<th style="padding:7px 6px;text-align:right;color:#6b8aaa;font-weight:700">매수가</th>';
  html += '<th style="padding:7px 6px;text-align:center;color:#4d9fff;font-weight:700">매수간격</th>';
  html += '<th style="padding:7px 6px;text-align:center;color:#00d4aa;font-weight:700">매도목표</th>';
  html += '</tr>';
  for (let i = 0; i < maxN; i++) {
    const price = prices[i] || '-';
    const buyG = i === 0 ? '초기 매수' : '-' + getPct(buyPct, i, maxN);
    const sellG = '+' + getPct(sellPct, i, maxN);
    const rowBg = i % 2 === 0 ? '#0a0e1a' : 'transparent';
    html += '<tr style="background:' + rowBg + ';border-bottom:1px solid #111a2a">';
    html += '<td style="padding:7px 6px;text-align:center;font-weight:700;color:#a78bfa">N' + (i+1) + '</td>';
    html += '<td style="padding:7px 6px;text-align:right;font-weight:700;color:#e0e6f0;font-family:monospace">₩' + (typeof price==='number'?price.toLocaleString():price) + '</td>';
    html += '<td style="padding:7px 6px;text-align:center;color:#4d9fff">' + buyG + '</td>';
    html += '<td style="padding:7px 6px;text-align:center;color:#00d4aa">' + sellG + '</td>';
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

// ── Tabs ───────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ['dashboard','history','criteria','vix'].forEach(t => {
    document.getElementById('pane-' + t).style.display = t === tab ? 'block' : 'none';

}

// ── Score Ring SVG ─────────────────────────────────────────
function scoreRing(score, size=56, color='#00d4aa') {
  const r = (size-8)/2, circ = 2*Math.PI*r, pct = Math.min(score,110)/110;
  return `<svg width="${size}" height="${size}" style="flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e2d4a" stroke-width="4"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${pct*circ} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2+1}" text-anchor="middle" dominant-baseline="middle"
      fill="${color}" font-size="${size<50?11:13}" font-weight="700" font-family="IBM Plex Mono,monospace">${score}</text>
  </svg>`;
}

  function sectionHTML(label, color, stocks, warning) {

    return `<div class="market-section">
      <div class="market-header">

// ── History ────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('pane-history');
  if (!historyData.length) {
    el.innerHTML = `<div class="empty-state">
      <div style="font-size:40px">📁</div>
      <div style="color:#e0e6f0;font-size:14px;font-weight:700">아직 추천 기록이 없습니다</div>
      <div style="color:#4d6a8a;font-size:12px">Python 스캐너를 실행하면 기록이 쌓입니다</div>
    </div>`;
    return;
  }

  // 종목 중심으로 머지
  const stockMap = {};
  historyData.forEach(h => {
    if (!stockMap[h.ticker]) stockMap[h.ticker] = [];
    stockMap[h.ticker].push(h);
  });

  const stocks = Object.values(stockMap).map(records => {
    records.sort((a,b) => a.scan_date.localeCompare(b.scan_date));
    const first = records[0];
    const latest = records[records.length - 1];
    const returnsWithData = records.filter(r => r.return_1m != null);
    const firstReturn = first.return_1m;
    return {
      ticker: first.ticker,
      name: first.name,
      grade: latest.grade,
      score: latest.score,
      appearances: records.length,
      first_date: first.scan_date,
      latest_date: latest.scan_date,
      first_entry: first.entry_price,
      latest_entry: latest.entry_price,
      return_1m: firstReturn,
      exit_price: first.exit_price,
      best_score: Math.max(...records.map(r=>r.score)),
      dates: records.map(r=>r.scan_date),
    };
  }).sort((a,b) => b.appearances - a.appearances || b.score - a.score);

  const uniqueCount = stocks.length;
  const scanDates = [...new Set(historyData.map(h=>h.scan_date))].sort();
  const totalScans = scanDates.length;
  const withReturn = stocks.filter(s => s.return_1m != null);
  const avgReturn = withReturn.length ? withReturn.reduce((a,s)=>a+s.return_1m,0)/withReturn.length : null;
  const winRate = withReturn.length ? withReturn.filter(s=>s.return_1m>0).length/withReturn.length*100 : null;

  const statsHTML = `<div class="history-stats">
    ${[
      {label:'추천 종목 수',  value:uniqueCount+'종목', color:'#e0e6f0'},
      {label:'스캔 횟수',  value:totalScans+'회 ('+scanDates[0]+' ~)', color:'#4d9fff'},
      {label:'평균 수익률', value:avgReturn!=null?`${avgReturn>=0?'▲':'▼'}${Math.abs(avgReturn).toFixed(1)}%`:'집계중',
        color:avgReturn==null?'#4d6a8a':avgReturn>=0?'#00d4aa':'#ff6b6b'},
      {label:'승률 (수익>0)', value:winRate!=null?`${winRate.toFixed(0)}%`:'집계중',
        color:winRate==null?'#4d6a8a':winRate>=60?'#00d4aa':winRate>=40?'#ffd166':'#ff6b6b'},
    ].map(s=>`<div class="stat-box"><div class="stat-label">${s.label}</div><div class="stat-value" style="color:${s.color}">${s.value}</div></div>`).join('')}
  </div>`;

  const rowsHTML = stocks.map(s => {
    const g = GRADE_CONFIG[s.grade] || GRADE_CONFIG['A'];
    const hasReturn = s.return_1m != null;
    const daysSince = Math.max(0, Math.floor((Date.now()-new Date(s.first_date).getTime())/(24*60*60*1000)));
    const retColor = !hasReturn?'#4d6a8a':s.return_1m>=5?'#00d4aa':s.return_1m>=0?'#4d9fff':'#ff6b6b';
    const retVal = hasReturn
      ? `<span style="color:${retColor};font-weight:700;font-size:13px">${s.return_1m>=0?'▲':'▼'}${Math.abs(s.return_1m).toFixed(1)}%</span>`
      : `<span style="color:#4d6a8a;font-size:11px">D+${daysSince}/30</span>`;
    const streakColor = s.appearances >= 5 ? '#00d4aa' : s.appearances >= 3 ? '#4d9fff' : '#4d6a8a';
    const priceDiff = s.first_entry && s.latest_entry ? ((s.latest_entry - s.first_entry)/s.first_entry*100) : null;
    return `<div style="background:#0d1224;border:1px solid #1e2d4a;border-radius:10px;padding:14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:14px;font-weight:700">${s.name}</span>
          <span style="color:#4d6a8a;font-size:11px">${s.ticker}</span>
          <span style="background:${g.bg};color:${g.color};font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px">${s.grade} · ${s.score}pt</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="background:${streakColor}18;color:${streakColor};font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px">${s.appearances}회 연속 추천</div>
          ${retVal}
        </div>
      </div>
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div style="color:#4d6a8a;font-size:11px">최초 ${s.first_date} <span style="color:#e0e6f0;font-weight:700">₩${(s.first_entry||0).toLocaleString()}</span></div>
        ${s.first_date !== s.latest_date ? `<div style="color:#4d6a8a;font-size:11px">최근 ${s.latest_date} <span style="color:#e0e6f0;font-weight:700">₩${(s.latest_entry||0).toLocaleString()}</span>${priceDiff!=null?`<span style="color:${priceDiff>=0?'#ff6b6b':'#4d9fff'};font-size:10px;margin-left:4px">${priceDiff>=0?'▲':'▼'}${Math.abs(priceDiff).toFixed(1)}%</span>`:''}</div>` : ''}
        ${hasReturn ? `<div style="color:#4d6a8a;font-size:11px">1개월 후 <span style="color:#e0e6f0;font-weight:700">₩${(s.exit_price||0).toLocaleString()}</span></div>` :
          `<div style="background:#1e2d4a;border-radius:3px;height:4px;width:60px;margin-top:2px"><div style="background:#4d9fff;height:100%;width:${Math.min(daysSince/30*100,100)}%;border-radius:3px"></div></div>`}
      </div>
      <div style="display:flex;gap:3px;margin-top:8px">${scanDates.map(d =>
        `<div style="flex:1;height:4px;border-radius:2px;background:${s.dates.includes(d)?g.color+'80':'#1e2d4a'}" title="${d}"></div>`
      ).join('')}</div>
    </div>`;
  }).join('');

  el.innerHTML = statsHTML + rowsHTML;
}
