<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAILVEIN — Forge Never Sleeps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080d0a;color:#d0dcc8;font-family:'Noto Sans KR','IBM Plex Mono',sans-serif;font-size:13px;min-height:100vh}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a100c}::-webkit-scrollbar-thumb{background:#1e2d20;border-radius:3px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9999}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Topbar (44px, 3-col grid — same as DAWNWATCH/GOLDHALLOW) ── */
.topbar{height:44px;background:#0c120e;border-bottom:1px solid #1e2d20;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200}
.topbar-logo{font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:.14em;color:#3ecf70}
.topbar-center{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#d0dcc8;letter-spacing:.08em}
.topbar-right{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.badge-live{background:rgba(62,207,112,.1);border:1px solid rgba(62,207,112,.25);color:#3ecf70;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:1px;display:flex;align-items:center;gap:4px}
.blink{width:5px;height:5px;background:#3ecf70;border-radius:50%;animation:blink 1.2s ease-in-out infinite}
.scan-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4a6650}
.topbar-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 12px;background:transparent;border:1px solid #1e2d20;color:#7a9a80;border-radius:3px;cursor:pointer;transition:all .15s;text-decoration:none}
.topbar-btn:hover{border-color:#3ecf70;color:#3ecf70}

/* ── Tabs ── */
.tabs{border-bottom:1px solid #1e2d20;padding:0 20px;display:flex;gap:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#5a7a60;padding:11px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab.active{border-bottom-color:#c4a44a;color:#c4a44a}
.tab:hover:not(.active){color:#8aaa90}
.tab-icon{font-size:13px}

/* ── Content ── */
.content{max-width:1200px;margin:0 auto;padding:20px}

/* ── Stats Bar ── */
.stats-row{display:flex;align-items:center;gap:16px;padding:9px 14px;background:#0c120e;border:1px solid #1e2d20;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;flex-wrap:wrap;margin-bottom:16px}
.stats-row .sl{color:#4a6650;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.stats-row .sv{color:#5a7a60}
.stats-row .sn{color:#8aaa90}
.stats-row .si{color:#E1306C}
.stats-row .sy{color:#c4a44a}
.stats-row .sd{color:#3a5640;margin-left:auto}

/* ── Month Pills ── */
.month-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.month-btn{background:#0c120e;color:#4a6650;border:1px solid #1a2a1c;border-radius:6px;padding:6px 13px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500}
.month-btn:hover{border-color:#2a4a30;color:#7a9a80}
.month-btn.active{background:linear-gradient(135deg,#c4a44a,#a8883a);color:#080d0a;border-color:transparent;font-weight:700}
.month-btn.disabled{opacity:.2;cursor:default}

/* ── Grid Layout ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:960px){.grid{grid-template-columns:1fr}}

/* ── Trail List Panel ── */
.panel{background:#0c120e;border:1px solid #1e2d20;border-radius:10px;overflow:hidden}
.panel-head{padding:10px 14px;border-bottom:1px solid #1a2a1c;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.2)}
.panel-title{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8aaa90;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.panel-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;background:rgba(196,164,74,.1);color:#c4a44a;border:1px solid rgba(196,164,74,.2);letter-spacing:.06em}
.panel-body{max-height:580px;overflow-y:auto}

/* ── Trail Card ── */
.tc{padding:13px 14px;border-bottom:1px solid #141c16;cursor:pointer;transition:all .15s;animation:fadeIn .3s ease both}
.tc:last-child{border-bottom:none}
.tc:hover{background:#101a12}
.tc.on{background:#101a12;box-shadow:inset 3px 0 0 #c4a44a}
.tc .rw{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tc .lt{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tc .rk{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;min-width:26px;text-align:right}
.tc .rk.t3{color:#c4a44a}
.tc .rk.dm{color:#1e2d20}
.tc .nr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tc .nm{font-size:15px;font-weight:500;color:#d0dcc8}
.tc .rg{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4a6650}
.tc .tr{font-size:12px}
.tc .tg{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap}
.tc .tgi{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#3a5640;letter-spacing:.04em}
.tc .rt{display:flex;align-items:center;gap:10px;flex-shrink:0}

/* Trend / Difficulty / Score */
.tu{color:#3ecf70;font-size:11px}
.tn{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:#c4a44a;background:rgba(196,164,74,.1);border:1px solid rgba(196,164,74,.2);border-radius:3px;padding:1px 5px}
.ts{color:#2a4a30;font-size:11px}
.df{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;border-radius:3px;padding:2px 6px}
.d하{color:#3ecf70;background:rgba(62,207,112,.08);border:1px solid rgba(62,207,112,.18)}
.d중{color:#c4a44a;background:rgba(196,164,74,.08);border:1px solid rgba(196,164,74,.18)}
.d상{color:#e84a4a;background:rgba(232,74,74,.08);border:1px solid rgba(232,74,74,.18)}
.sb{display:flex;align-items:center;gap:6px}
.strack{width:40px;height:3px;background:#1a2a1c;border-radius:2px;overflow:hidden}
.sfill{height:100%;border-radius:2px;transition:width .6s}
.snum{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500}
.sbs{display:flex;gap:2px}
.sbi{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;border-radius:2px;padding:1px 3px;line-height:11px}

/* ── Detail (expands inside card) ── */
.dt{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #1a2a1c}
.tc.on .dt{display:block}
.dt p{font-size:14px;color:#8aaa90;line-height:1.85;font-weight:300}
.dt .mt{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:11px}
.dt .ml{color:#3a5640}.dt .mv{color:#7a9a80}.dt .mi{color:#E1306C}

/* ── Map Panel ── */
.map-panel{border-radius:10px;overflow:hidden;border:1px solid #1e2d20;position:sticky;top:60px;height:600px;background:#0c120e}
.map-head{padding:10px 14px;border-bottom:1px solid #1a2a1c;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.2)}
.map-title{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8aaa90;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
#map{height:calc(100% - 40px);width:100%}

/* Leaflet overrides */
.leaflet-control-zoom a{background:#0c120e!important;color:#5a7a60!important;border-color:#1e2d20!important}
.leaflet-control-zoom a:hover{background:#1a2a1c!important;color:#3ecf70!important}
.leaflet-control-attribution{background:rgba(8,13,10,.85)!important;color:#3a5640!important;font-size:9px!important}
.leaflet-control-attribution a{color:#3a5640!important}
.leaflet-popup-content-wrapper{background:#0c120e;color:#d0dcc8;border-radius:8px;border:1px solid #1e2d20;font-family:'Noto Sans KR',sans-serif}
.leaflet-popup-tip{background:#0c120e}
.leaflet-popup-content{font-size:13px;line-height:1.7}
.leaflet-popup-content .pn{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;color:#c4a44a;letter-spacing:.04em}
.leaflet-popup-content .pr{font-family:'IBM Plex Mono',monospace;color:#4a6650;font-size:10px}
.leaflet-popup-content .ps{font-family:'IBM Plex Mono',monospace;color:#c4a44a;font-weight:500}
.leaflet-popup-close-button{color:#4a6650!important}

/* States */
.empty{text-align:center;padding:3.5rem;color:#3a5640;font-family:'IBM Plex Mono',monospace;font-size:12px}
.ld{display:flex;align-items:center;justify-content:center;height:200px;color:#4a6650;font-family:'IBM Plex Mono',monospace;font-size:12px;gap:8px}
.ld::after{content:'';width:16px;height:16px;border:2px solid #1e2d20;border-top-color:#c4a44a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{max-width:1200px;margin:32px auto 0;padding:14px 20px;border-top:1px solid #1a2a1c;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#2a4a30;flex-wrap:wrap;gap:8px}

/* Mobile */
@media(max-width:768px){
  .topbar{padding:0 12px}
  .topbar-center span:not(.badge-live){display:none}
  .content{padding:14px 12px}
  .tabs{overflow-x:auto}
  .stats-row{font-size:10px;gap:10px}
}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a class="topbar-logo" href="https://mav-ash.com">◆ FORGE NEVER SLEEPS</a>
  <div class="topbar-center">
    <span>TRAILVEIN</span>
    <span class="badge-live"><span class="blink"></span>LIVE</span>
  </div>
  <div class="topbar-right">
    <span class="scan-date" id="scanDate"></span>
    <a class="topbar-btn" href="https://mav-ash.com">⚡ 전력 대시보드</a>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('recommend')"><span class="tab-icon">🗺</span> 이달의 추천</button>
  <button class="tab" onclick="switchTab('map')"><span class="tab-icon">📍</span> 전체 지도</button>
</div>

<!-- Content -->
<div class="content">
  <div class="stats-row" id="statsBar"></div>
  <div class="month-row" id="months"></div>

  <div class="grid">
    <!-- Left: Trail List -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title" id="panelTitle">추천지</span>
        <span class="panel-badge" id="panelBadge"></span>
      </div>
      <div class="panel-body" id="list">
        <div class="ld">데이터 로딩 중</div>
      </div>
    </div>
    <!-- Right: Map -->
    <div class="map-panel">
      <div class="map-head">
        <span class="map-title">위치</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#3a5640">Leaflet + CartoDB Dark</span>
      </div>
      <div id="map"></div>
    </div>
  </div>
</div>

<div class="footer">
  <span>trailvein · mav-ash.com</span>
  <span>수집: 네이버 블로그 + IG Graph API + Google Custom Search</span>
  <span>처리: Ollama gemma2 @ Mac Mini</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API='https://api.mav-ash.com/api/trails/data';
const MK=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const TM={'산':'⛰','능선':'〰','계곡':'🏞','해변':'🏖','해안':'🌊','강변':'🏞','호수':'💧','섬':'🏝'};
const SR={blog:{l:'B',c:'#3ecf70'},cafe:{l:'C',c:'#58e888'},instagram:{l:'IG',c:'#E1306C'},youtube:{l:'YT',c:'#c4a44a'},tistory:{l:'T',c:'#eb531f'},brunch:{l:'Br',c:'#7a9a80'}};
let D=null,cM=new Date().getMonth()+1,aI=null,map,mks=[];

function initMap(){
  map=L.map('map',{zoomControl:true}).setView([36.5,127.8],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',maxZoom:18
  }).addTo(map);
}

async function load(){
  try{
    const r=await fetch(API),j=await r.json();
    D=j.data||j;render();
  }catch(e){
    console.error(e);
    document.getElementById('list').innerHTML='<div class="empty">데이터를 불러올 수 없습니다.<br>파이프라인 실행 후 다시 시도해 주세요.</div>';
  }
}

function render(){if(!D)return;rStats();rMonths();rList();rMap()}

function rStats(){
  const s=D.source_stats||{};
  document.getElementById('scanDate').textContent='스캔: '+(D.updated||'—');
  document.getElementById('statsBar').innerHTML=
    `<span class="sl">data source</span>`+
    `<span class="sv">블로그 <span class="sn">${(s.blog_posts||0).toLocaleString()}</span></span>`+
    `<span class="sv">커뮤니티 <span class="sn">${(s.community_posts||0).toLocaleString()}</span></span>`+
    `<span class="si">IG <span class="sn">${(s.instagram_posts||0).toLocaleString()}</span></span>`+
    `<span class="sy">YT+블로그 <span class="sn">${(s.google_posts||0).toLocaleString()}</span></span>`+
    `<span class="sd">total ${((s.blog_posts||0)+(s.community_posts||0)+(s.instagram_posts||0)+(s.google_posts||0)).toLocaleString()} posts</span>`;
}

function rMonths(){
  const av=Object.keys(D.months||{}).map(Number);
  if(av.length&&!av.includes(cM))cM=av[0];
  document.getElementById('months').innerHTML=MK.map((m,i)=>{
    const n=i+1,a=av.includes(n),c=n===cM?'active':(!a?'disabled':'');
    return `<button class="month-btn ${c}" ${a?`onclick="sM(${n})"`:''} >${m}</button>`;
  }).join('');
}

function sM(m){cM=m;aI=null;rMonths();rList();rMap()}
function switchTab(t){/* 향후 탭 전환 기능 */}

function rList(){
  const t=(D.months||{})[cM]||[];
  document.getElementById('panelTitle').textContent=`${MK[cM-1]} 추천지`;
  document.getElementById('panelBadge').textContent=`TOP ${t.length}`;
  const el=document.getElementById('list');
  if(!t.length){el.innerHTML='<div class="empty">아직 데이터가 수집되지 않았습니다.<br>다음 수집 주기에 업데이트됩니다.</div>';return}
  el.innerHTML=t.map((v,i)=>`<div class="tc ${aI===i?'on':''}" onclick="sT(${i})" style="animation-delay:${i*50}ms">
    <div class="rw"><div class="lt">
      <span class="rk ${v.rank<=3?'t3':'dm'}">${String(v.rank).padStart(2,'0')}</span>
      <div><div class="nr">
        <span class="tr">${TM[v.terrain]||'⛰'}</span>
        <span class="nm">${v.name}</span>
        <span class="rg">${v.region}</span>
        ${bd(v.trend)}${sb(v.source_types)}
      </div>
      <div class="tg">${(v.tags||[]).map(x=>`<span class="tgi">#${x}</span>`).join('')}</div></div>
    </div><div class="rt">
      <span class="df d${v.difficulty}">${v.difficulty}</span>
      <div class="sb"><div class="strack"><div class="sfill" style="width:${v.score}%;background:${sc(v.score)}"></div></div>
      <span class="snum" style="color:${sc(v.score)}">${v.score}</span></div>
    </div></div>
    <div class="dt"><p>${v.description||''}</p><div class="mt">
      <div><span class="ml">야영지 </span><span class="mv">${v.best_camp||'—'}</span></div>
      <div><span class="ml">언급 </span><span class="mv">${v.mentions||0} posts</span></div>
      <div><span class="ml">좌표 </span><span class="mv">${v.coords?v.coords[0].toFixed(3)+', '+v.coords[1].toFixed(3):'—'}</span></div>
      ${v.ig_posts>0?`<div><span class="ml mi">IG </span><span class="mv">${v.ig_posts} · </span><span class="mi">${(v.ig_engagement||0).toLocaleString()}</span></div>`:''}</div></div></div>`).join('')}

function sT(i){
  aI=aI===i?null:i;rList();
  const t=(D.months||{})[cM]||[],v=t[i];
  if(v&&v.coords&&v.coords[0]!==0&&aI!==null){
    map.flyTo([v.coords[0],v.coords[1]],11,{duration:.8});
    mks.forEach(m=>{if(m._i===i)m.openPopup()});
  }
}

function rMap(){
  mks.forEach(m=>map.removeLayer(m));mks=[];
  const t=(D.months||{})[cM]||[],bs=[];
  t.forEach((v,i)=>{
    if(!v.coords||v.coords[0]===0)return;
    bs.push([v.coords[0],v.coords[1]]);
    const ic=L.divIcon({className:'',html:`<div style="
      background:${v.rank<=3?'#c4a44a':'#1e2d20'};
      color:${v.rank<=3?'#080d0a':'#5a7a60'};
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
      border:2px solid ${v.rank<=3?'#c4a44a':'#2a4a30'};
      box-shadow:0 2px 10px rgba(0,0,0,.6);
    ">${v.rank}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    const mk=L.marker([v.coords[0],v.coords[1]],{icon:ic}).addTo(map)
      .bindPopup(`<div class="pn">${TM[v.terrain]||'⛰'} ${v.name}</div>
        <div class="pr">${v.region} · ${v.terrain||'산'}</div>
        <div style="margin-top:6px;font-size:13px;line-height:1.7;color:#8aaa90">${v.description||''}</div>
        <div style="margin-top:8px"><span class="ps">점수 ${v.score}</span>
        <span style="color:#4a6650;margin-left:8px">난이도 ${v.difficulty}</span></div>`,{maxWidth:280});
    mk._i=i;
    mk.on('click',()=>{aI=i;rList();document.querySelectorAll('.tc')[i]?.scrollIntoView({behavior:'smooth',block:'center'})});
    mks.push(mk)});
  if(bs.length)map.fitBounds(bs,{padding:[30,30]});
}

function sc(s){return s>=90?'#3ecf70':s>=80?'#58e888':'#c4a44a'}
function bd(t){if(t==='up')return '<span class="tu">▲</span>';if(t==='new')return '<span class="tn">NEW</span>';return '<span class="ts">━</span>'}
function sb(types){if(!types||!types.length)return '';return '<span class="sbs">'+types.map(t=>{const b=SR[t];if(!b)return '';return `<span class="sbi" style="color:${b.c};border:1px solid ${b.c}33">${b.l}</span>`}).join('')+'</span>'}

initMap();load();
</script>
</body>
</html>
