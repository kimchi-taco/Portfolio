    const CATEGORIES = [

    /* ── Canvas Map ── */
    const MapView = ({ restaurants, selected, onSelect }) => {
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const bounds = { minLat: 37.568, maxLat: 37.583, minLng: 126.970, maxLng: 127.002 };

      const project = (lat, lng, w, h) => {
        const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * (w - 80) + 40;
        const y = (1 - (lat - bounds.minLat) / (bounds.maxLat - bounds.minLat)) * (h - 80) + 40;
        return [x, y];
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        const container = containerRef.current;
        if (!canvas || !container) return;
        const w = container.clientWidth;
        const h = container.clientHeight;
        canvas.width = w * 2; canvas.height = h * 2;
        canvas.style.width = w + "px"; canvas.style.height = h + "px";
        const ctx = canvas.getContext("2d");
        ctx.scale(2, 2);

        // BG
        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, w, h);
        // Grid
        ctx.strokeStyle = "rgba(255,255,255,0.04)"; ctx.lineWidth = 1;
        for (let i = 0; i < w; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
        for (let i = 0; i < h; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
        // Roads
        ctx.strokeStyle = "rgba(255,200,100,0.08)"; ctx.lineWidth = 3;
        let p1 = project(37.570, 126.970, w, h), p2 = project(37.570, 127.002, w, h);
        ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
        p1 = project(37.583, 126.977, w, h); p2 = project(37.568, 126.977, w, h);
        ctx.beginPath(); ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]); ctx.stroke();
        // Area labels
        ctx.font = "11px 'Pretendard Variable', sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.15)";
        const areas = [["광화문",37.5755,126.9770],["종로3가",37.571,126.992],["인사동",37.575,126.986],["북촌",37.580,126.984]];
        areas.forEach(([n,lat,lng]) => { const p = project(lat,lng,w,h); ctx.fillText(n, p[0], p[1]); });

        // Pins
        restaurants.forEach((r) => {
          const [x, y] = project(r.coords[0], r.coords[1], w, h);
          const isSel = selected && selected.id === r.id;
          if (isSel) {
            const grd = ctx.createRadialGradient(x, y, 0, x, y, 25);
            grd.addColorStop(0, "rgba(255,107,53,0.4)"); grd.addColorStop(1, "rgba(255,107,53,0)");
            ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.fill();
          }
          const cc = r.category.includes("노포") ? "#ff6b35" : r.category.includes("비즈니스") ? "#e8c547" : r.category.includes("회식") ? "#4ecdc4" : "#a8e6cf";
          ctx.fillStyle = isSel ? "#fff" : cc;
          ctx.beginPath(); ctx.arc(x, y, isSel ? 10 : 7, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1.5; ctx.stroke();
          if (isSel) {
            ctx.font = "bold 13px 'Pretendard Variable', sans-serif";
            const tw = ctx.measureText(r.name).width; const pad = 6;
            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.beginPath(); ctx.roundRect(x-tw/2-pad, y-28-pad, tw+pad*2, 20+pad, 4); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.fillText(r.name, x-tw/2, y-22);
          }
        });
        // Legend
        const legend = [{color:"#ff6b35",label:"노포"},{color:"#4ecdc4",label:"회식"},{color:"#a8e6cf",label:"점심"},{color:"#e8c547",label:"비즈니스"}];
        ctx.font = "12px 'Pretendard Variable', sans-serif";
        legend.forEach((l, i) => { const lx=16, ly=h-20-(legend.length-1-i)*22;
          ctx.fillStyle=l.color; ctx.beginPath(); ctx.arc(lx,ly-4,5,0,Math.PI*2); ctx.fill();
          ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.fillText(l.label,lx+14,ly);
        });
      }, [restaurants, selected]);

      const handleClick = (e) => {
        const canvas = canvasRef.current, container = containerRef.current;
        if (!canvas || !container) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const w = container.clientWidth, h = container.clientHeight;
        let closest = null, minDist = Infinity;
        restaurants.forEach((r) => {
          const [x, y] = project(r.coords[0], r.coords[1], w, h);
          const dist = Math.sqrt((mx-x)**2 + (my-y)**2);
          if (dist < 20 && dist < minDist) { minDist = dist; closest = r; }
        });
        if (closest) onSelect(closest);
      };

      return (
        <div ref={containerRef} style={{ width: "100%", height: "100%", position: "relative" }}>
          <canvas ref={canvasRef} onClick={handleClick} style={{ cursor: "pointer", borderRadius: 12 }} />
        </div>
      );
    };

    /* ── Info Item ── */
    const InfoItem = ({ label, value, sub, isPhone }) => (

              {r.category.map((c) => {

                const fg = c==="노포"?"#ff6b35":c==="비즈니스"?"#e8c547":c==="회식"?"#4ecdc4":"#a8e6cf";

              })}

          {/* Verdict */}
          <p style={{ fontSize: 16, color: "rgba(255,255,255,0.7)", margin: "8px 0 0", lineHeight: 1.6 }}>{r.verdict}</p>

          {/* Expanded */}
          {isSelected && expanded && (

              <p style={{ fontSize: 16, color: "rgba(255,255,255,0.6)", lineHeight: 1.7, marginBottom: 16 }}>{r.description}</p>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "14px 24px", marginBottom: 16 }}>

              </div>

              {/* Menu */}
              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "rgba(255,255,255,0.4)", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>메뉴</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {r.menu.map((m, i) => (
                    <div key={i} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 8, padding: "8px 14px", display: "flex", gap: 12, alignItems: "center" }}>

                  onClick={(e) => e.stopPropagation()}
